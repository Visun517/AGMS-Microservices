server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # 01. Zone Management Service
        - id: zone-service
          uri: lb://ZONE-SERVICE
          predicates:
            - Path=/api/zones/**

        # 02. Sensor Telemetry Service
        - id: sensor-service
          uri: lb://SENSOR-SERVICE
          predicates:
            - Path=/api/sensors/**

        # 03. Automation & Control Service
        - id: automation-service
          uri: lb://AUTOMATION-SERVICE
          predicates:
            - Path=/api/automation/**

        # 04. Crop Inventory Service
        - id: crop-service
          uri: lb://CROP-SERVICE
          predicates:
            - Path=/api/crops/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

